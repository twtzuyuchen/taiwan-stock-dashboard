name: 每日收盤後更新台股儀表板

on:
  schedule:
    - cron: "0 11 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write config from secrets
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: |
          python - <<'EOF'
          import os, yaml
          with open("config/config.example.yaml") as f:
              cfg = yaml.safe_load(f)
          cfg["finmind"]["token"] = os.environ["FINMIND_TOKEN"]
          with open("config/config.yaml", "w") as f:
              yaml.safe_dump(cfg, f, allow_unicode=True)
          EOF

      - name: Run daily update (fetch -> analyze -> render)
        run: python scripts/daily_update.py --config config/config.yaml

      - name: Commit dashboard + signal state to repo
        run: |
          git config user.name "dashboard-bot"
          git config user.email "dashboard-bot@users.noreply.github.com"
          git add docs/ state/ || true
          git diff --cached --quiet || git commit -m "chore: 自動更新台股儀表板 $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
