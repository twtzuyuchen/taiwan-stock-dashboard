scoring:
  # 綜合評分權重（總和建議 = 1.0）
  weights:
    chip_cleanliness: 0.25      # 籌碼乾淨度
    institutional_position: 0.30 # 主力布局分數
    technical_trend: 0.20       # 技術趨勢
    fundamental: 0.25           # 基本面催化
  thresholds:
    green: 70   # 分數 >= 70 顯示綠燈
    yellow: 40  # 40~69 顯示黃燈，< 40 顯示紅燈

  # 籌碼乾淨度細項設定（可省略，省略時採用下列預設值）
  # 三個子項分數缺資料時會自動略過並重新分配權重，三者皆缺才會回傳中性分數 50
  chip_cleanliness_detail:
    weights:
      margin_momentum: 0.45      # 融資餘額動能（近 N 日融資餘額變化）
      margin_utilization: 0.25   # 融資使用率（融資餘額 / 融資限額）
      holder_concentration: 0.30 # 大戶持股集中度趨勢（集保股權分散表）
    # 融資使用率：<= safe 滿分；>= danger 0 分；中間線性內插
    utilization_safe: 0.5
    utilization_danger: 0.9
    # 大戶門檻：持股張數下限（股數），400000 股 = 400 張
    big_holder_min_shares: 400000
    # 大戶集中度比較最近幾次集保股權分散表（每週更新，4 次約等於近一個月）
    holder_lookback_snapshots: 4

  # 未來一年樂觀價／穩健價／悲觀價（本益比河流圖模型）細項設定，可省略。
  # 這是量化模型估算，不是分析師報告或共識目標價；任何資料不足的情況都會明確顯示原因，不會硬湊數字。
  valuation_band_detail:
    per_percentile_low: 20      # 悲觀價使用的本益比分位數
    per_percentile_mid: 50      # 穩健價使用的本益比分位數（中位數）
    per_percentile_high: 80     # 樂觀價使用的本益比分位數
    growth_rate_cap_pct: 30     # 用營收年增率估算未來EPS成長時，正負限制在這個百分比以內
    min_per_samples: 60         # 本益比歷史樣本至少要有這麼多筆，才視為統計上足夠可靠

output:
  dashboard_dir: "output"
  # 是否同時輸出 GitHub Pages 用的 docs/index.html
  publish_github_pages: true
  github_pages_dir: "docs"
  # 買賣訊號需要跨日比較（評分區間轉換），狀態存在這個資料夾，
  # 必須跟 docs/ 一樣被 git commit，下次執行才讀得到「昨天」的結果
  state_dir: "state"
