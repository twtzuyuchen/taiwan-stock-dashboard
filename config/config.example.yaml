scoring:
  # 綜合評分權重（總和建議 = 1.0）
  weights:
    chip_cleanliness: 0.25      # 籌碼乾淨度
    institutional_position: 0.30 # 主力布局分數
    technical_trend: 0.20       # 技術趨勢
    fundamental: 0.25           # 基本面催化
  thresholds:
    green: 70   # 分數 >= 70 顯示綠燈
    yellow: 40  # 40~69 顯示黃燈，< 40 顯示紅燈

  # 籌碼乾淨度細項設定（可省略，省略時採用下列預設值）
  # 三個子項分數缺資料時會自動略過並重新分配權重，三者皆缺才會回傳中性分數 50
  chip_cleanliness_detail:
    weights:
      margin_momentum: 0.45      # 融資餘額動能（近 N 日融資餘額變化）
      margin_utilization: 0.25   # 融資使用率（融資餘額 / 融資限額）
      holder_concentration: 0.30 # 大戶持股集中度趨勢（集保股權分散表）
    # 融資使用率：<= safe 滿分；>= danger 0 分；中間線性內插
    utilization_safe: 0.5
    utilization_danger: 0.9
    # 大戶門檻：持股張數下限（股數），400000 股 = 400 張
    big_holder_min_shares: 400000
    # 大戶集中度比較最近幾次集保股權分散表（每週更新，4 次約等於近一個月）
    holder_lookback_snapshots: 4

  # 未來一年樂觀價／穩健價／悲觀價（本益比河流圖模型）細項設定，可省略。
  # 這是量化模型估算，不是分析師報告或共識目標價；任何資料不足的情況都會明確顯示原因，不會硬湊數字。
  valuation_band_detail:
    per_percentile_low: 20      # 悲觀價使用的本益比分位數
    per_percentile_mid: 50      # 穩健價使用的本益比分位數（中位數）
    per_percentile_high: 80     # 樂觀價使用的本益比分位數
    growth_rate_cap_pct: 30     # 用營收年增率估算未來EPS成長時，正負限制在這個百分比以內
    min_per_samples: 60         # 本益比歷史樣本至少要有這麼多筆，才視為統計上足夠可靠

  # 主力建倉訊號（悄悄吸籌）細項設定，可省略，省略時採用下列預設值
  # 三個條件同時成立才會觸發：買超天數比例夠高、買超力道加速、股價尚未大幅表態
  accumulation_detail:
    # 第一層：法人籌碼面（必要條件，三者同時成立才算過關）
    buy_ratio_threshold: 0.7    # 近N個交易日中，買超天數至少要佔這個比例
    price_change_cap_pct: 15    # 同期股價漲幅超過這個百分比，視為已被市場表態，不算悄悄建倉
    min_days: 5                 # 可比對交易日至少要有這麼多天，才進行判斷
    # 第二層：價量型態佐證（輔助條件，第一層過關後才會檢查；資料不足的項目會自動排除，不硬湊）
    min_pattern_evidence: 2         # 下列三項型態中，至少要有幾項成立才算通過第二層
    volume_spike_multiplier: 1.8    # 「關鍵價位量增不漲」：單日量能達20日均量的幾倍才算放大
    price_flat_threshold_pct: 3     # 「關鍵價位量增不漲」：當天漲跌幅需在這個範圍內才算「不漲」
    near_low_pct: 10                # 「關鍵價位量增不漲」：收盤價需落在期間最低點上方這個百分比內，才算「關鍵價位」
    reversal_recovery_pct: 5        # 「股價強勢破底翻」：創新低後至今反彈幅度要達到這個百分比
    consolidation_recent_days: 5    # 「盤整期量縮至極致」：近幾個交易日視為「近期」
    consolidation_prior_days: 15    # 「盤整期量縮至極致」：近期之前的幾個交易日視為比較基準的「前段」
    consolidation_shrink_ratio: 0.6 # 「盤整期量縮至極致」：近期均量需萎縮到前段均量的這個比例以下
    consolidation_range_cap_pct: 5  # 「盤整期量縮至極致」：近期股價波動幅度需收斂在這個百分比以內

  # 左側交易（逢低佈局）進場提醒細項設定，可省略，省略時採用下列預設值
  # 現價跌到「主力估算成本」或「未來一年悲觀價」任一價位以下（含緩衝）就觸發
  left_side_entry_detail:
    buffer_pct: 0   # 現價在成本/悲觀價之上這個緩衝百分比以內也一併觸發（預設0=剛好跌破才觸發）

  # 右側交易（確認轉強）進場提醒細項設定，可省略，省略時採用下列預設值
  # 三個條件同時成立才會觸發：近期出現黃金交叉且延續、股價突破近期高點、成交量放大確認
  right_side_entry_detail:
    golden_cross_lookback_days: 10  # 黃金交叉需在近幾個交易日內發生，才算是「最近」轉強
    breakout_lookback_days: 20      # 股價要突破近幾個交易日的收盤高點
    volume_multiplier: 1.5          # 當日成交量要達到均量的幾倍，才算放量確認
    vol_baseline_days: 20           # 計算均量所用的天數

output:
  dashboard_dir: "output"
  # 是否同時輸出 GitHub Pages 用的 docs/index.html
  publish_github_pages: true
  github_pages_dir: "docs"
  # 買賣訊號需要跨日比較（評分區間轉換），狀態存在這個資料夾，
  # 必須跟 docs/ 一樣被 git commit，下次執行才讀得到「昨天」的結果
  state_dir: "state"
