    chip_cleanliness: 0.25
    institutional_position: 0.30
    technical_trend: 0.20
    fundamental: 0.25
  thresholds:
    green: 70
    yellow: 40

  chip_cleanliness_detail:
    weights:
      margin_momentum: 0.45
      margin_utilization: 0.25
      holder_concentration: 0.30
    utilization_safe: 0.5
    utilization_danger: 0.9
    big_holder_min_shares: 400000
    holder_lookback_snapshots: 4

