# ============================================================
# 台股波段 AI Agent 儀表板 — 設定檔範例
# 複製為 config.yaml 並填入你自己的金鑰 / 追蹤清單
# ============================================================

finmind:
  # 註冊 https://finmindtrade.com 取得 token（免費會員即可，額度較高）
  token: "YOUR_FINMIND_TOKEN"
  # 近兩週主力成本計算用的回溯交易日數（10 個交易日 ≈ 2 週）
  lookback_trading_days: 10

watchlist:
  # 每檔股票的代號、名稱、風險偏好、持股狀態
  - stock_id: "2303"
    name: "聯電"
    risk_preference: "積極"
    holding: true
    analysis_period: "1-3個月"
