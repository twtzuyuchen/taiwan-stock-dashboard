finmind:
  # 註冊 https://finmindtrade.com 取得 token（免費會員即可，額度較高）
  token: "YOUR_FINMIND_TOKEN"
  # 主力成本與籌碼乾淨度融資動能子項共用的回溯交易日數（20 個交易日 ≈ 4 週）
  lookback_trading_days: 20
  # 「未來一年價格情境估算」本益比河流圖模型用的本益比歷史回溯天數（日曆天，預設約3年）。
  # 這個天數只影響 fetch_data.py 抓 TaiwanStockPER 的區間，不影響其他資料集。
  valuation_lookback_days: 1095

